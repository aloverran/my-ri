<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- ri mark: 512px. Full detail.
       Refined ring with crisp gradient, prominent inner ring,
       diamond with a highlight edge, faint radial guides
       suggesting structure radiating from center. -->
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4dbdff"/>
      <stop offset="50%" stop-color="#007acc"/>
      <stop offset="100%" stop-color="#005a99"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2da6ff"/>
      <stop offset="100%" stop-color="#005fa3"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Faint ambient glow behind the whole mark -->
  <circle cx="256" cy="256" r="140" fill="#007acc" opacity="0.06" filter="url(#soft)"/>

  <!-- Radial guide lines (very faint, structural) -->
  <g stroke="#007acc" stroke-width="0.7" opacity="0.07">
    <line x1="256" y1="60" x2="256" y2="452"/>
    <line x1="60" y1="256" x2="452" y2="256"/>
    <line x1="117" y1="117" x2="395" y2="395"/>
    <line x1="395" y1="117" x2="117" y2="395"/>
  </g>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring)" stroke-width="12"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#007acc" stroke-width="3" opacity="0.18"/>

  <!-- Diamond glow layer -->
  <rect x="220" y="220" width="72" height="72" rx="8"
        fill="#007acc" opacity="0.15" transform="rotate(45 256 256)"
        filter="url(#glow)"/>

  <!-- Diamond body -->
  <rect x="220" y="220" width="72" height="72" rx="8"
        fill="url(#gem)" transform="rotate(45 256 256)"/>

  <!-- Diamond highlight (top-left face catch) -->
  <rect x="220" y="220" width="72" height="72" rx="8"
        fill="url(#highlight)" transform="rotate(45 256 256)"/>
</svg>
