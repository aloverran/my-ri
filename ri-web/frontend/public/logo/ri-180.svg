<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- ri mark: 180px. Apple touch icon size.
       Same detail level as 128, proportions tuned for 180. -->
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#33aaff"/>
      <stop offset="100%" stop-color="#0070b8"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a9fff"/>
      <stop offset="100%" stop-color="#006ab5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="90" cy="90" r="72" fill="none" stroke="url(#ring)" stroke-width="5.5"/>

  <!-- Inner ring -->
  <circle cx="90" cy="90" r="47" fill="none" stroke="#007acc" stroke-width="1.8" opacity="0.2"/>

  <!-- Diamond -->
  <rect x="77" y="77" width="26" height="26" rx="3.5"
        fill="#007acc" opacity="0.2" transform="rotate(45 90 90)"
        filter="url(#glow)"/>
  <rect x="77" y="77" width="26" height="26" rx="3.5"
        fill="url(#gem)" transform="rotate(45 90 90)"/>
</svg>
